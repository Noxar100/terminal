function w(text,cls=''){
  const d=document.createElement('span');
  d.className='ln'+(cls?' '+cls:'');
  d.innerHTML=text;
  T.appendChild(d);
  T.scrollTop=T.scrollHeight;
}

function delay(lines,interval,done){
  let i=0;
  function next(){
    if(i>=lines.length){done&&done();return;}
    const item=lines[i];
    Array.isArray(item)?w(item[0],item[1]||''):w(item);
    i++;
    setTimeout(next,interval+rand(0,Math.floor(interval*0.5)));
  }
  next();
}

function startInput(){
  inp.disabled = false;
  inp.focus();
}

function runCmd(cmd){
  if(inp.disabled) return;
  inp.value=cmd;
  inp.dispatchEvent(new KeyboardEvent('keydown',{key:'Enter',bubbles:true}));
}

inp.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const cmd=inp.value.trim().toLowerCase();
    inp.value='';
    if(!cmd){w('');return;}
    hist.unshift(cmd);hIdx=-1;
    w('<span class="dim">'+now()+'</span> <span class="ok">root@shadownet:~#</span> '+cmd);
    inp.disabled = true;
    if(COMMANDS[cmd]) COMMANDS[cmd]();
    else if(cmd==='help') delay(HELP,28,startInput);
    else{w('<span class="err">bash: '+cmd+': command not found</span>');w('');startInput();}
  }
  if(e.key==='ArrowUp'){e.preventDefault();if(hIdx<hist.length-1){hIdx++;inp.value=hist[hIdx];}}
  if(e.key==='ArrowDown'){e.preventDefault();if(hIdx>0){hIdx--;inp.value=hist[hIdx];}else{hIdx=-1;inp.value='';}}
});

// tap outside input → refocus
document.getElementById('ht').addEventListener('click',()=>inp.focus());
