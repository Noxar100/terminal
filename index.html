let promptLine = null;

function startInput(){
  listening = true;
  writePrompt();
  focusInput();
  input.addEventListener("input", onInput);
  input.addEventListener("keydown", onKey);
}

function writePrompt(){
  // létrehozunk egy új div-et a promptnak
  promptLine = document.createElement("div");
  promptSpan = document.createElement("span");
  promptSpan.textContent = ">> ";
  promptLine.appendChild(promptSpan);
  terminal.appendChild(promptLine);
  terminal.scrollTop = terminal.scrollHeight;
}

function focusInput(){ 
  input.focus(); 
}

function onInput(e){
  userInput = e.target.value;
  if(promptSpan){
    promptSpan.textContent = ">> " + userInput;
  }
}

function onKey(e){
  if(e.key === "Enter"){
    // lezárjuk a promptot, új sor a következő kimenethez
    input.removeEventListener("input", onInput);
    input.removeEventListener("keydown", onKey);
    input.value = "";
    terminal.appendChild(document.createElement("div")); // új sor a következő parancsnak
    processCommand(userInput.trim().toLowerCase());
    userInput = "";
  }
}


/* ====== COMMANDS ====== */

  else if(cmd==="upload"){ spam(uploadLines,100); }
  else if(cmd==="clear"){ terminal.innerHTML=""; startInput(); }

}
